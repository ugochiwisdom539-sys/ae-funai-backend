<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE-FUNAI Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body class="center-body">
<div class="container">
    <header class="header">
        <h1>AE-FUNAI Admin Login</h1>
        <p class="subtitle">Access the administration panel.</p>
    </header>

    <form id="adminLoginForm">
        <div class="form-group">
            <label for="adminUsername">Username</label>
            <input type="text" id="adminUsername" placeholder="Username" required>
        </div>
        <div class="form-group">
            <label for="adminPassword">Password</label>
            <input type="password" id="adminPassword" placeholder="Password" required>
        </div>
        <p id="adminFingerprintStatus" class="status-message"></p>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>

    <div class="signup-link">
        Not an administrator? Go to <a href="/registration.html">Student Registration</a>.
    </div>
</div>

<script src="shared.js"></script>
</body>
            </html>
